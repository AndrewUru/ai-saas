name: Weekly UI/UX Improvements

on:
  workflow_dispatch:
  schedule:
    - cron: "0 8 * * 1"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: weekly-ui-ux-improvements
  cancel-in-progress: false

jobs:
  propose-ui-ux-improvement:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Stop if a weekly UI/UX PR is already open
        id: open-pr
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          COUNT="$(gh pr list \
            --state open \
            --json headRefName \
            --jq '[.[] | select(.headRefName | startswith("automation/weekly-ui-ux-"))] | length')"
          echo "count=$COUNT" >> "$GITHUB_OUTPUT"
          if [ "$COUNT" != "0" ]; then
            echo "A weekly UI/UX PR is already open. Skipping this run."
          fi

      - name: Apply next weekly UI/UX improvement
        if: steps.open-pr.outputs.count == '0'
        run: npm run improve:weekly

      - name: Try validation
        if: steps.open-pr.outputs.count == '0'
        id: validation
        continue-on-error: true
        run: |
          npm ci
          npm run lint
          npm run build

      - name: Record validation note
        if: always() && steps.open-pr.outputs.count == '0'
        run: |
          {
            echo ""
            echo "## Automation validation"
            echo ""
            if [ "${{ steps.validation.outcome }}" = "success" ]; then
              echo "- GitHub Actions validation passed: npm ci, lint, build."
            else
              echo "- GitHub Actions validation did not pass. Review package manager/dependency state before merge."
            fi
          } >> .maintenance/reports/weekly-ui-improvement-pr.md

      - name: Check for changes
        if: steps.open-pr.outputs.count == '0'
        id: changes
        shell: bash
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create draft pull request
        if: steps.open-pr.outputs.count == '0' && steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        shell: bash
        run: |
          BRANCH="automation/weekly-ui-ux-${GITHUB_RUN_ID}"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git switch -c "$BRANCH"
          git add .
          git commit -m "chore: propose weekly UI/UX improvement"
          git push --set-upstream origin "$BRANCH"
          PR_URL="https://github.com/${GITHUB_REPOSITORY}/pull/new/${BRANCH}"
          if ! gh pr create \
            --draft \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "Weekly UI/UX improvement" \
            --body-file .maintenance/reports/weekly-ui-improvement-pr.md 2> pr-create-error.log; then
            cat pr-create-error.log

            if grep -q "GitHub Actions is not permitted to create or approve pull requests" pr-create-error.log; then
              {
                echo "### Pull request was not created automatically"
                echo ""
                echo "The automation pushed the branch, but this repository has not enabled GitHub Actions to create pull requests."
                echo ""
                echo "- Branch: \`$BRANCH\`"
                echo "- Manual PR URL: $PR_URL"
                echo ""
                echo "To enable automatic PR creation, open repository Settings > Actions > General > Workflow permissions, enable read/write permissions, and allow GitHub Actions to create and approve pull requests."
              } >> "$GITHUB_STEP_SUMMARY"
              echo "Branch pushed. Create the PR manually: $PR_URL"
              exit 0
            fi

            exit 1
          fi

      - name: No ready improvement
        if: steps.open-pr.outputs.count == '0' && steps.changes.outputs.has_changes != 'true'
        run: echo "No weekly UI/UX improvement changes were generated."
