name: Weekly Maintenance Audit

on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1"

permissions:
  contents: read
  issues: write

jobs:
  maintenance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Requires playwright, lighthouse and chrome-launcher in devDependencies.
      - name: Install browser
        run: npx playwright install --with-deps chromium

      - name: Run maintenance audit
        run: npm run maintenance:audit:full -- --no-fail

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: weekly-maintenance-report
          path: .maintenance/reports/**

      - name: Create issue on scheduled run
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          REPORT="$(find .maintenance/reports -name weekly-report.md | sort | tail -n 1)"
          gh issue create \
            --title "Weekly maintenance audit" \
            --body-file "$REPORT" \
            --label "maintenance"
